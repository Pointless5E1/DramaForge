<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>Novel Forge</title>
    <!-- https://developer.mozilla.org/en-US/docs/Web/HTTP/CSP -->
    <!--
      注意：實際生效的 CSP 在 vite.config.web.ts 中由 html-transform 插件統一覆蓋。
      這裏保持與其一致，放寬 connect-src 以便局域網 / 服務器部署時訪問任意後端主機。
    -->
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; script-src 'self' 'wasm-unsafe-eval'; style-src 'self' 'unsafe-inline'; connect-src * https://api.github.com; img-src 'self' data:"
    />
  </head>

  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
